name: poc-bicep-$(workloadName)-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - scripts/**
      - pipelines/**
    exclude:
      - docs/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - scripts/**
      - pipelines/**
    exclude:
      - docs/**

variables:
  workloadName: avd
  environmentName: poc
  avdDevOpsEnvironment: poc-avd
  avdSharedDevOpsEnvironment: poc-avd-shared
  # Service connection for normal AVD POC workload resources.
  avdDeployServiceConnection: tv-avd-poc-deploy-sc
  # Service connection for shared image/gallery/platform resources.
  avdSharedResourcesServiceConnection: tv-avd-shared-deploy-sc
  # Service connection for hub/spoke peering work.
  avdNetworkPeeringServiceConnection: tv-avd-network-peering-sc
  azureLocation: eastus

pool:
  vmImage: ubuntu-latest

stages:
  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: bootstrap
      azureDevOpsEnvironment: $(avdDevOpsEnvironment)
      azureServiceConnection: $(avdDeployServiceConnection)
      environmentName: poc
      workloadName: $(workloadName)-bootstrap
      deploymentScope: Subscription
      deploymentLocation: $(azureLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/bootstrap/main.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/bootstrap/poc.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads

  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: serviceobjects
      validationDependsOn:
      deployDependsOn:
        - Deploy_bootstrap
      azureDevOpsEnvironment: $(avdDevOpsEnvironment)
      avdDeployServiceConnection: $(avdDeployServiceConnection)
      environmentName: poc
      workloadName: $(workloadName)-serviceobjects
      deploymentScope: Subscription
      deploymentLocation: $(azureLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/service-objects/main.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/service-objects/poc.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads

  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: network
      validationDependsOn:
      deployDependsOn:
        - Deploy_bootstrap
      azureDevOpsEnvironment: $(avdDevOpsEnvironment)
      azureServiceConnection: $(avdDeployServiceConnection)
      environmentName: poc
      workloadName: $(workloadName)-network
      deploymentScope: Subscription
      deploymentLocation: $(azureLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/network/main.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/network/poc.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads

  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: networkpeering
      validationDependsOn:
        - Deploy_network
      deployDependsOn:
        - Deploy_network
      azureDevOpsEnvironment: $(avdDevOpsEnvironment)
      azureServiceConnection: $(avdNetworkPeeringServiceConnection)
      environmentName: poc
      workloadName: $(workloadName)-networkpeering
      deploymentScope: Subscription
      deploymentLocation: $(azureLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/network/peering.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/network/poc.peering.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads

  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: storage
      validationDependsOn:
        - Deploy_network
      deployDependsOn:
        - Deploy_network
      azureDevOpsEnvironment: $(avdDevOpsEnvironment)
      azureServiceConnection: $(avdDeployServiceConnection)
      environmentName: poc
      workloadName: $(workloadName)-storage
      deploymentScope: Subscription
      deploymentLocation: $(azureLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/storage/main.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/storage/poc.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads

  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: compute
      validationDependsOn:
        - Deploy_storage
        - Deploy_shareresources
      deployDependsOn:
        - Deploy_storage
        - Deploy_sharedresources
      azureDevOpsEnvironment: $(avdDevOpsEnvironment)
      azureServiceConnection: $(avdDeployServiceConnection)
      environmentName: poc
      workloadName: $(workloadName)-compute
      deploymentScope: Subscription
      deploymentLocation: $(azureLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/compute/main.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/compute/poc.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads

  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: sharedresources
      validationDependsOn:
      deployDependsOn:
        - Deploy_bootstrap
      azureDevOpsEnvironment: $(avdSharedDevOpsEnvironment)
      azureServiceConnection: $(avdSharedResourcesServiceConnection)
      environmentName: poc
      workloadName: $(workloadName)-sharedresources
      deploymentScope: Subscription
      deploymentLocation: $(azureLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/sharedresources/main.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/sharedresources/poc.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads
