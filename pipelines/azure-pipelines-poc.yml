name: poc-bicep-$(workloadName)-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - scripts/**
      - pipelines/**
    exclude:
      - docs/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - scripts/**
      - pipelines/**
    exclude:
      - docs/**

variables:
  workloadName: avd
  environmentName: poc
  azureDevOpsEnvironment: poc-avd
  azureServiceConnection: tv-avd-poc-deploy-sc
  deploymentLocation: eastus

pool:
  vmImage: ubuntu-latest

stages:
  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: bootstrap
      azureDevOpsEnvironment: $(azureDevOpsEnvironment)
      azureServiceConnection: $(azureServiceConnection)
      environmentName: poc
      workloadName: $(environmentName)-$(workloadName)-bootstrap
      deploymentScope: Subscription
      deploymentLocation: $(deploymentLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/bootstrap/main.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/bootstrap/poc.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads


  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: serviceobjects
      deployDependsOn:
        - Deploy_bootstrap
      azureDevOpsEnvironment: $(azureDevOpsEnvironment)
      azureServiceConnection: $(azureServiceConnection)
      environmentName: poc
      workloadName: $(environmentName)-$(workloadName)-serviceobjects
      deploymentScope: Subscription
      deploymentLocation: $(deploymentLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/serviceobjects/main.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/serviceobjects/poc.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads

  - template: templates/bicep-deployment-template.yml
    parameters:
      deploymentUnitName: storage
      deployDependsOn:
        - Deploy_serviceobjects
      azureDevOpsEnvironment: $(azureDevOpsEnvironment)
      azureServiceConnection: $(azureServiceConnection)
      environmentName: poc
      workloadName: $(environmentName)-$(workloadName)-storage
      deploymentScope: Subscription
      deploymentLocation: $(deploymentLocation)
      templateFile: "$(Build.SourcesDirectory)/infra/modules/storage/main.bicep"
      parameterFile: "$(Build.SourcesDirectory)/infra/modules/storage/poc.bicepparam"
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads
