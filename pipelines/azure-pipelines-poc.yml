name: dev-bicep-$(workloadName)-$(Date:yyyyMMdd)$(Rev:.r)

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - scripts/**
      - pipelines/**
    exclude:
      - docs/**

pr:
  branches:
    include:
      - main
  paths:
    include:
      - infra/**
      - scripts/**
      - pipelines/**
    exclude:
      - docs/**

variables:
  workloadName: <workload-name>

pool:
  vmImage: ubuntu-latest

stages:
  - template: templates/bicep-deployment-template.yml
    parameters:
      azureServiceConnection: '<poc-service-connection-name>'
      environmentName: poc
      workloadName: $(workloadName)
      resourceGroupName: '<poc-resource-group-name>'
      validationLevel: Provider
      whatIfResultFormat: FullResourcePayloads
