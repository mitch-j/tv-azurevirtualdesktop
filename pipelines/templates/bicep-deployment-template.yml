parameters:
  - name: azureServiceConnection
    displayName: Azure service connection
    type: string

  - name: deploymentUnitName
    displayName: Deployment unit name
    type: string
    default: infrastructure

  - name: validationDependsOn
    type: object
    default: []

  - name: deployDependsOn
    type: object
    default: []

  - name: azureDevOpsEnvironment
    displayName: Azure DevOps environment used for deployment approvals
    type: string
    default: ""

  - name: environmentName
    displayName: Environment
    type: string
    values:
      - poc
      - dev
      - test
      - prod
      - shared
      - e2e
      - dr

  - name: workloadName
    displayName: Workload name
    type: string

  - name: deploymentScope
    displayName: Deployment scope
    type: string
    default: ResourceGroup
    values:
      - ResourceGroup
      - Subscription

  - name: deploymentLocation
    displayName: Subscription deployment location
    type: string
    default: eastus

  - name: resourceGroupName
    displayName: Resource group name for resource group scoped deployments
    type: string
    default: ""

  - name: templateFile
    displayName: Bicep template file
    type: string

  - name: parameterFile
    displayName: Bicep parameter file
    type: string

  - name: validationLevel
    displayName: ARM validation level
    type: string
    default: Provider
    values:
      - Provider
      - ProviderNoRbac
      - Template

  - name: whatIfResultFormat
    displayName: What-if result format
    type: string
    default: FullResourcePayloads
    values:
      - FullResourcePayloads
      - ResourceIdOnly

stages:
  - stage: Validate_${{ parameters.deploymentUnitName }}
    displayName: Validate ${{ parameters.deploymentUnitName }} ${{ parameters.environmentName }}
    dependsOn: ${{ parameters.validationDependsOn }}
    variables:
      scriptPath: "$(Build.SourcesDirectory)/scripts/Invoke-BicepDeployment.ps1"
    jobs:
      - job: ValidateBicep
        displayName: Compile and Validate Bicep
        steps:
          - checkout: self
            displayName: "Checkout Bicep Module"

          - task: AzureCLI@2
            displayName: Validate Bicep
            inputs:
              azureSubscription: "${{ parameters.azureServiceConnection }}"
              scriptType: pscore
              scriptLocation: scriptPath
              scriptPath: "$(scriptPath)"
              arguments: >
                -Action Validate
                -DeploymentScope "${{ parameters.deploymentScope }}"
                -DeploymentLocation "${{ parameters.deploymentLocation }}"
                -ResourceGroupName "${{ parameters.resourceGroupName }}"
                -TemplateFile "${{ parameters.templateFile }}"
                -ParameterFile "${{ parameters.parameterFile }}"
                -DeploymentName "${{ parameters.environmentName }}-${{ parameters.workloadName }}-validate-$(Build.BuildId)"
                -ArtifactOutputPath "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-validate"
                -ValidationLevel "${{ parameters.validationLevel }}"
                -EnsureBicep

          - publish: "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-validate"
            artifact: "${{ parameters.environmentName }}-${{ parameters.deploymentUnitName }}-bicep-validate"
            condition: always()

  - stage: WhatIf_${{ parameters.deploymentUnitName }}
    displayName: What-if ${{ parameters.deploymentUnitName }} ${{ parameters.environmentName }}
    dependsOn: Validate_${{ parameters.deploymentUnitName }}
    variables:
      scriptPath: "$(Build.SourcesDirectory)/scripts/Invoke-BicepDeployment.ps1"
    jobs:
      - job: WhatIf
        displayName: Run Bicep what-if
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: What-if Bicep
            inputs:
              azureSubscription: "${{ parameters.azureServiceConnection }}"
              scriptType: pscore
              scriptLocation: scriptPath
              scriptPath: "$(scriptPath)"
              arguments: >
                -Action WhatIf
                -DeploymentScope "${{ parameters.deploymentScope }}"
                -DeploymentLocation "${{ parameters.deploymentLocation }}"
                -ResourceGroupName "${{ parameters.resourceGroupName }}"
                -TemplateFile "${{ parameters.templateFile }}"
                -ParameterFile "${{ parameters.parameterFile }}"
                -DeploymentName "${{ parameters.environmentName }}-${{ parameters.workloadName }}-whatif-$(Build.BuildId)"
                -ArtifactOutputPath "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-whatif"
                -ValidationLevel "${{ parameters.validationLevel }}"
                -WhatIfResultFormat "${{ parameters.whatIfResultFormat }}"
                -EnsureBicep

          - publish: "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-whatif"
            artifact: "${{ parameters.environmentName }}-${{ parameters.deploymentUnitName }}-bicep-whatif"
            condition: always()

  - stage: Deploy_${{ parameters.deploymentUnitName }}
    displayName: Deploy ${{ parameters.deploymentUnitName }} ${{ parameters.environmentName }}
    dependsOn:
      - WhatIf_${{ parameters.deploymentUnitName }}
      - ${{ each dependency in parameters.deployDependsOn }}:
          - ${{ dependency }}
    condition: >
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        ne(variables['Build.Reason'], 'PullRequest'),
        in(variables['Build.Reason'], 'IndividualCI', 'BatchedCI', 'Manual')
      )
    variables:
      scriptPath: "$(Build.SourcesDirectory)/scripts/Invoke-BicepDeployment.ps1"
    jobs:
      - deployment: DeployInfrastructure
        displayName: Deploy Infrastructure
        environment: "${{ parameters.azureDevOpsEnvironment }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Deploy Bicep
                  inputs:
                    azureSubscription: "${{ parameters.azureServiceConnection }}"
                    scriptType: pscore
                    scriptLocation: scriptPath
                    scriptPath: "$(scriptPath)"
                    arguments: >
                      -Action Deploy
                      -DeploymentScope "${{ parameters.deploymentScope }}"
                      -DeploymentLocation "${{ parameters.deploymentLocation }}"
                      -ResourceGroupName "${{ parameters.resourceGroupName }}"
                      -TemplateFile "${{ parameters.templateFile }}"
                      -ParameterFile "${{ parameters.parameterFile }}"
                      -DeploymentName "${{ parameters.environmentName }}-${{ parameters.workloadName }}-deploy-$(Build.BuildId)"
                      -ArtifactOutputPath "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-deploy"
                      -EnsureBicep

                - publish: "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-deploy"
                  artifact: "${{ parameters.environmentName }}-${{ parameters.deploymentUnitName }}-bicep-deploy"
                  condition: always()
