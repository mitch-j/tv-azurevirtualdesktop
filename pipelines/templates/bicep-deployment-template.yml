parameters:
  - name: azureServiceConnection
    displayName: Azure service connection
    type: string

  - name: deploymentUnitName
    displayName: Deployment unit name
    type: string
    default: infrastructure

  - name: validationDependsOn
    type: object
    default: []

  - name: deployDependsOn
    type: object
    default: []

  - name: azureDevOpsEnvironment
    displayName: Azure DevOps environment used for deployment approvals
    type: string
    default: ""

  - name: environmentName
    displayName: Environment
    type: string
    values:
      - poc
      - dev
      - test
      - prod
      - shared
      - e2e
      - dr

  - name: workloadName
    displayName: Workload name
    type: string

  - name: deploymentScope
    displayName: Deployment scope
    type: string
    default: ResourceGroup
    values:
      - ResourceGroup
      - Subscription

  - name: deploymentLocation
    displayName: Subscription deployment location
    type: string
    default: eastus

  - name: resourceGroupName
    displayName: Resource group name for resource group scoped deployments
    type: string
    default: ""

  - name: templateFile
    displayName: Bicep template file
    type: string

  - name: parameterFile
    displayName: Bicep parameter file
    type: string

  - name: validationLevel
    displayName: ARM validation level
    type: string
    default: Provider
    values:
      - Provider
      - ProviderNoRbac
      - Template

  - name: whatIfResultFormat
    displayName: What-if result format
    type: string
    default: FullResourcePayloads
    values:
      - FullResourcePayloads
      - ResourceIdOnly

  - name: keyVaultName
    displayName: Optional Key Vault name used to load deployment secrets
    type: string
    default: ""

  - name: keyVaultSecretsFilter
    displayName: Optional comma-separated Key Vault secret names to load
    type: string
    default: ""

  - name: additionalParametersJson
    displayName: Optional additional deployment parameters as JSON array
    type: string
    default: ""

  - name: additionalScriptArguments
    displayName: Optional additional script arguments passed to Invoke-BicepDeployment.ps1
    type: string
    default: ""

  - name: skipBuild
    displayName: Skip Bicep build/build-params
    type: boolean
    default: false

  - name: useComputeSecretParameters
    type: boolean
    default: false

stages:
  - stage: Validate_${{ parameters.deploymentUnitName }}
    displayName: Validate ${{ parameters.deploymentUnitName }} ${{ parameters.environmentName }}
    dependsOn: ${{ parameters.validationDependsOn }}
    variables:
      scriptPath: "$(Build.SourcesDirectory)/scripts/Invoke-BicepDeployment.ps1"
    jobs:
      - job: ValidateBicep
        displayName: Compile and Validate Bicep
        steps:
          - checkout: self
            displayName: "Checkout Bicep Module"

          - ${{ if ne(parameters.keyVaultName, '') }}:
              - task: AzureKeyVault@2
                displayName: "Get Key Vault secrets"
                inputs:
                  azureSubscription: "${{ parameters.azureServiceConnection }}"
                  KeyVaultName: "${{ parameters.keyVaultName }}"
                  SecretsFilter: "${{ parameters.keyVaultSecretsFilter }}"
                  RunAsPreJob: false

          - task: AzureCLI@2
            displayName: Validate Bicep
            inputs:
              azureSubscription: "${{ parameters.azureServiceConnection }}"
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                $additionalParametersJson = ''

                if ('${{ parameters.useComputeSecretParameters }}' -eq 'true') {
                    $additionalParametersJson = @(
                        "localAdminUsername=$env:AVD_LOCAL_ADMIN_USERNAME"
                        "localAdminPassword=$env:AVD_LOCAL_ADMIN_PASSWORD"
                        "domainJoinUserName=$env:AVD_DOMAIN_JOIN_USERNAME"
                        "domainJoinPassword=$env:AVD_DOMAIN_JOIN_PASSWORD"
                    ) | ConvertTo-Json -Compress
                }

                . "$(Build.SourcesDirectory)/scripts/Invoke-BicepDeployment.ps1" `
                  -Action Validate `
                  -DeploymentScope "${{ parameters.deploymentScope }}" `
                  -DeploymentLocation "${{ parameters.deploymentLocation }}" `
                  -ResourceGroupName "${{ parameters.resourceGroupName }}" `
                  -TemplateFile "${{ parameters.templateFile }}" `
                  -ParameterFile "${{ parameters.parameterFile }}" `
                  -DeploymentName "${{ parameters.environmentName }}-${{ parameters.workloadName }}-validate-$(Build.BuildId)" `
                  -ArtifactOutputPath "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-validate" `
                  -ValidationLevel "${{ parameters.validationLevel }}" `
                  -EnsureBicep `
                  ${{ parameters.additionalScriptArguments }} `
                  -AdditionalParametersJson $additionalParametersJson
            env:
              AVD_LOCAL_ADMIN_USERNAME: $(avd-local-admin-username)
              AVD_LOCAL_ADMIN_PASSWORD: $(avd-local-admin-password)
              AVD_DOMAIN_JOIN_USERNAME: $(avd-domain-join-username)
              AVD_DOMAIN_JOIN_PASSWORD: $(avd-domain-join-password)

          - publish: "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-validate"
            artifact: "${{ parameters.environmentName }}-${{ parameters.deploymentUnitName }}-bicep-validate"
            condition: always()

          - task: AzureCLI@2
            displayName: What-if Bicep
            inputs:
              azureSubscription: "${{ parameters.azureServiceConnection }}"
              scriptType: pscore
              scriptLocation: inlineScript
              inlineScript: |
                $artifactOutputPath = "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-whatif"

                New-Item -ItemType Directory -Path $artifactOutputPath -Force | Out-Null

                $additionalParametersJson = ''

                if ('${{ parameters.useComputeSecretParameters }}' -eq 'true') {
                    $additionalParametersJson = @(
                        "localAdminUsername=$env:AVD_LOCAL_ADMIN_USERNAME"
                        "localAdminPassword=$env:AVD_LOCAL_ADMIN_PASSWORD"
                        "domainJoinUserName=$env:AVD_DOMAIN_JOIN_USERNAME"
                        "domainJoinPassword=$env:AVD_DOMAIN_JOIN_PASSWORD"
                    ) | ConvertTo-Json -Compress
                }

                . "$(Build.SourcesDirectory)/scripts/Invoke-BicepDeployment.ps1" `
                  -Action WhatIf `
                  -DeploymentScope "${{ parameters.deploymentScope }}" `
                  -DeploymentLocation "${{ parameters.deploymentLocation }}" `
                  -ResourceGroupName "${{ parameters.resourceGroupName }}" `
                  -TemplateFile "${{ parameters.templateFile }}" `
                  -ParameterFile "${{ parameters.parameterFile }}" `
                  -DeploymentName "${{ parameters.environmentName }}-${{ parameters.workloadName }}-whatif-$(Build.BuildId)" `
                  -ArtifactOutputPath $artifactOutputPath `
                  -ValidationLevel "${{ parameters.validationLevel }}" `
                  -WhatIfResultFormat "${{ parameters.whatIfResultFormat }}" `
                  -EnsureBicep `
                  ${{ parameters.additionalScriptArguments }} `
                  -AdditionalParametersJson $additionalParametersJson
            env:
              AVD_LOCAL_ADMIN_USERNAME: $(avd-local-admin-username)
              AVD_LOCAL_ADMIN_PASSWORD: $(avd-local-admin-password)
              AVD_DOMAIN_JOIN_USERNAME: $(avd-domain-join-username)
              AVD_DOMAIN_JOIN_PASSWORD: $(avd-domain-join-password)

          - task: PublishPipelineArtifact@1
            displayName: "Publish what-if output"
            condition: and(succeededOrFailed(), exists('$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-whatif'))
            inputs:
              targetPath: "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-whatif"
              artifact: "${{ parameters.deploymentUnitName }}-bicep-whatif"

  - stage: Deploy_${{ parameters.deploymentUnitName }}
    displayName: Deploy ${{ parameters.deploymentUnitName }} ${{ parameters.environmentName }}
    dependsOn:
      - WhatIf_${{ parameters.deploymentUnitName }}
      - ${{ each dependency in parameters.deployDependsOn }}:
          - ${{ dependency }}
    condition: >
      and(
        succeeded(),
        eq(variables['Build.SourceBranch'], 'refs/heads/main'),
        ne(variables['Build.Reason'], 'PullRequest'),
        in(variables['Build.Reason'], 'IndividualCI', 'BatchedCI', 'Manual')
      )
    variables:
      scriptPath: "$(Build.SourcesDirectory)/scripts/Invoke-BicepDeployment.ps1"
    jobs:
      - deployment: DeployInfrastructure
        displayName: Deploy Infrastructure
        environment: "${{ parameters.azureDevOpsEnvironment }}"
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - ${{ if ne(parameters.keyVaultName, '') }}:
                    - task: AzureKeyVault@2
                      displayName: "Get Key Vault secrets"
                      inputs:
                        azureSubscription: "${{ parameters.azureServiceConnection }}"
                        KeyVaultName: "${{ parameters.keyVaultName }}"
                        SecretsFilter: "${{ parameters.keyVaultSecretsFilter }}"
                        RunAsPreJob: false

                - task: AzureCLI@2
                  displayName: Deploy Bicep
                  inputs:
                    azureSubscription: "${{ parameters.azureServiceConnection }}"
                    scriptType: pscore
                    scriptLocation: inlineScript
                    inlineScript: |
                      $additionalParametersJson = ''

                      if ('${{ parameters.useComputeSecretParameters }}' -eq 'true') {
                          $additionalParametersJson = @(
                              "localAdminUsername=$env:AVD_LOCAL_ADMIN_USERNAME"
                              "localAdminPassword=$env:AVD_LOCAL_ADMIN_PASSWORD"
                              "domainJoinUserName=$env:AVD_DOMAIN_JOIN_USERNAME"
                              "domainJoinPassword=$env:AVD_DOMAIN_JOIN_PASSWORD"
                          ) | ConvertTo-Json -Compress
                      }

                      . "$(Build.SourcesDirectory)/scripts/Invoke-BicepDeployment.ps1" `
                            -Action Deploy
                            -DeploymentScope "${{ parameters.deploymentScope }}"
                            -DeploymentLocation "${{ parameters.deploymentLocation }}"
                            -ResourceGroupName "${{ parameters.resourceGroupName }}"
                            -TemplateFile "${{ parameters.templateFile }}"
                            -ParameterFile "${{ parameters.parameterFile }}"
                            -DeploymentName "${{ parameters.environmentName }}-${{ parameters.workloadName }}-deploy-$(Build.BuildId)"
                            -ArtifactOutputPath "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-deploy"
                            -EnsureBicep
                            ${{ parameters.additionalScriptArguments }}
                            -AdditionalParametersJson '${{ parameters.additionalParametersJson }}'

                - publish: "$(Build.ArtifactStagingDirectory)/${{ parameters.deploymentUnitName }}/bicep-deploy"
                  artifact: "${{ parameters.environmentName }}-${{ parameters.deploymentUnitName }}-bicep-deploy"
                  condition: always()
